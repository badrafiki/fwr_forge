<!doctype html>
<html lang="en" ng-app="forgeApp">

<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Forge / Five Clans Online</title>
  <link rel="shortcut icon" type="image/x-icon" href="img/favicon.ico">
  <link rel="stylesheet" href="bower_components/bootstrap/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/app.css">
  <link rel="stylesheet" href="css/game-icons.css">

  <!-- Google Maps API for Spawns -->
  <script type="text/javascript"
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBiltCepizciTV1V6EY7edbD62hoczx1x0">
  </script>
</head>

<body>
  <a id="top"></a>
  <nav class="navbar navbar-inverse navbar-static-top" role="navigation" ng-controller="HeaderCtrl">
    <div class="container">
      <!-- Brand and toggle get grouped for better mobile display -->
      <div class="navbar-header">
        <button type="button" class="navbar-toggle" data-toggle="collapse" data-target="#bs-example-navbar-collapse-1">
          <span class="sr-only">Toggle navigation</span>
          <span class="icon-bar"></span>
          <span class="icon-bar"></span>
          <span class="icon-bar"></span>
        </button>
        <a class="navbar-brand" href="#/files">
          <img src="img/forge-inverse.png" class="logo" />Forge</a>
      </div>
      <!-- Collect the nav links, forms, and other content for toggling -->
      <div class="collapse navbar-collapse" id="bs-example-navbar-collapse-1">
        <ul class="nav navbar-nav">
          <li ng-class="{ active: isActive('/files')}">
            <a href="#/files">Files</a>
          </li>
          <li ng-class="{ active: isActive('/strings')}">
            <a href="#/strings">Strings</a>
          </li>
          <li ng-class="{ active: isActive('/maps')}">
            <a href="#/maps">Maps</a>
          </li>
          <li ng-class="{ active: isActive('/filelocs')}">
            <a href="#/filelocs">File Locs</a>
          </li>
          <li ng-class="{ active: isActive('/sets')}">
            <a href="#/sets">Sets</a>
          </li>
          <li ng-class="{ active: isActive('/icons')}">
            <a href="#/icons">Icons</a>
          </li>
          <li ng-class="{ active: isActive('/spawns')}">
            <a href="#/spawns">Spawns</a>
          </li>
        </ul>
        <ul class="nav navbar-nav navbar-right">
        </ul>
      </div>
      <!-- /.navbar-collapse -->
    </div>
    <!-- /.container -->
  </nav>

  <div ng-view></div>

  <!-- jQuery (necessary for Bootstrap's JavaScript plugins) -->
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.11.1/jquery.min.js"></script>
  <!-- Include all compiled plugins (below), or include individual files as needed -->
  <script src="bower_components/bootstrap/dist/js/bootstrap.min.js"></script>
  <!-- Angular  -->
  <script src="bower_components/angular/angular.js"></script>
  <script src="bower_components/angular-route/angular-route.js"></script>
  <!-- Angular UI Bootstrap -->
  <script src="bower_components/angular-bootstrap/ui-bootstrap.min.js"></script>
  <script src="bower_components/angular-bootstrap/ui-bootstrap-tpls.min.js"></script>
  <!-- Base -->
  <script src="js/app.js"></script>
  <script src="js/controllers.js"></script>
  <script src="js/directives.js"></script>
  <script src="js/array.services.js"></script>
  <!-- File -->
  <script src="modules/file/js/file.module.js"></script>
  <script src="modules/file/js/file.controllers.js"></script>
  <script src="modules/file/js/file.services.js"></script>
  <script src="modules/file/js/file.directives.js"></script>
  <!-- Icon -->
  <script src="modules/icon/js/icon.module.js"></script>
  <script src="modules/icon/js/icon.controllers.js"></script>
  <script src="modules/icon/js/icon.services.js"></script>
  <script src="modules/icon/js/icon.directives.js"></script>
  <!-- Map -->
  <script src="modules/map/js/map.module.js"></script>
  <script src="modules/map/js/map.controllers.js"></script>
  <script src="modules/map/js/map.services.js"></script>
  <script src="modules/map/js/map.directives.js"></script>

  <script src="modules/string/js/string.module.js"></script>
  <script src="modules/string/js/string.controllers.js"></script>
  <script src="modules/string/js/string.services.js"></script>
  <!-- FileLoc -->
  <script src="modules/fileloc/js/fileloc.module.js"></script>
  <script src="modules/fileloc/js/fileloc.controllers.js"></script>
  <script src="modules/fileloc/js/fileloc.services.js"></script>
  <script src="modules/fileloc/js/fileloc.directives.js"></script>
  <!-- Set -->
  <script src="modules/set/js/set.module.js"></script>
  <script src="modules/set/js/set.controllers.js"></script>
  <script src="modules/set/js/set.services.js"></script>
  <!-- Spawns -->
  <script src="modules/spawn/js/spawn.module.js"></script>
  <script src="modules/spawn/js/spawn.controllers.js"></script>
  <script src="modules/spawn/js/spawn.services.js"></script>

</html>
