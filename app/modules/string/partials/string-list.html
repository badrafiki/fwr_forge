<div class="container" id="affix-demo">
  <div class="row">
    <div class="col-md-2">
      <button class="btn btn-default" title="Add new string" ng-click="OpenStringCreateDialog()" ng-disabled="{{strings.length == 0}}">
        <span class="glyphicon glyphicon-plus"></span>&nbspAdd
      </button>
    </div>
    <div class="col-md-4 col-md-offset-6">
      <div class="input-group">
        <span class="input-group-addon">
          <span class="glyphicon glyphicon-search"></span>
        </span>
        <input type="text" class="form-control" ng-model="query">
        <span class="input-group-btn">
          <button class="btn btn-danger" type="button" ng-click="query = ''" ng-show="query.length">
            <span class="glyphicon glyphicon-remove"></span>
          </button>
        </span>
      </div>
    </div>
  </div>

  <div class="row">

    <div class="col-md-5">
      <h5 class="text-align-left">
        <em>Displaying {{filtered.length.toLocaleString()}} of {{strings.length.toLocaleString()}} strings</em>
      </h5>
    </div>

    <div class="col-md-7">
      <h5 class="text-right">
        <small>
          <em>For performance reasons, display is limited to max&nbsp
            <input type="number" name="input" ng-model="limit">&nbspstrings.
          </em>
          [ <a href="" ng-click="limit = strings.length">Show all</a> ] [ <a href="" ng-click="limit = defaultLimit">Reset</a> ]
        </small>
      </h5>
    </div>
  </div>

  <div class="row">
    <div class="col-md-12">
      <table class="table table-hover table-condensed">
        <thead>
          <tr>
            <th>Id</th>
            <th>String</th>
            <th>Params</th>
          </tr>
        </thead>
        <tbody>
          <tr ng-show="!strings">
            <td colspan="3">Loading...</td>
          </tr>
          <tr ng-repeat="string in filtered = (strings | filter:query | limitTo:limit)" ng-click="OpenStringViewDialog(string)" class="hand-cursor">
            <td>{{string.id}}</td>
            <td>{{string.english.string}}</td>
            <td>{{string.english.params.join()}}</td>
          </tr>
          <tr class="active hand-cursor" ng-show="strings.length > 0 && limit != strings.length && filtered.length >= limit" ng-click="limit = limit * 2">
            <td colspan="3" class="active text-center">
              <span class="glyphicon glyphicon-chevron-down"></span>
              <span style="padding-left:40px; padding-right:40px;">
                <small>
                  <strong>LOAD MORE</strong>
                </small>
              </span>
              <span class="glyphicon glyphicon-chevron-down"></span>
            </td>
          </tr>
          <tr class="active" ng-show="strings.length > 0 && limit == strings.length">
            <td colspan="3" class="active text-center">
              <span>
                <small>
                  <strong>END</strong>
                </small>
              </span>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
