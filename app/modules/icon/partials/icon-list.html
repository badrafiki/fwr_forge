<div class="container">
  <div class="row">
    <div class="col-md-12">
      <div class="alert alert-info" role="alert">
        These are all the icons as specified in viconlist.dat. They are automatically layered based on the spritesheets from the game client. Hover over an icon for the icon ID.
      </div>
    </div>
  </div>
  <div class="row">
    <div class="col-md-12">
      <game-icon ng-repeat="icon in icons" icon="icon" icon-tooltip="icon.id"></game-icon>
    </div>
  </div>
</div>
